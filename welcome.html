<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LunaNet Mission Control - Welcome</title>
<style>
body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at 30% 50%, #0b111e 0%, #030509 70%, #000000 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
}

/* Starfield Background Layer via Subtle Box Shadows */
body::before {
    content: "";
    position: absolute;
    width: 2px;
    height: 2px;
    top: 0;
    left: 0;
    box-shadow: 
        15vw 10vh #fff, 35vw 25vh rgba(255,255,255,0.7), 75vw 15vh #fff, 
        85vw 40vh rgba(255,255,255,0.5), 20vw 70vh #fff, 60vw 80vh rgba(255,255,255,0.8), 
        90vw 85vh #fff, 45vw 60vh rgba(255,255,255,0.6), 10vw 45vh rgba(255,255,255,0.4),
        50vw 20vh #fff, 65vw 70vh rgba(255,255,255,0.9), 80vw 90vh #fff;
    animation: twitchStars 4s infinite alternate ease-in-out;
}

@keyframes twitchStars {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
}

/* Planetary Orbs Vectors */
.splash-earth {
    position: absolute;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle at 30% 30%, #1a3c6c 0%, #0d1b2a 60%, #050b14 100%);
    border-radius: 50%;
    left: 15%;
    top: 35%;
    box-shadow: 0 0 35px rgba(26, 60, 108, 0.4), inset -10px -10px 25px rgba(0,0,0,0.95);
}

.splash-moon {
    position: absolute;
    width: 60px;
    height: 60px;
    background: radial-gradient(circle at 30% 30%, #6c757d 0%, #343a40 70%, #1c1d21 100%);
    border-radius: 50%;
    right: 18%;
    top: 45%;
    box-shadow: 0 0 20px rgba(255,255,255,0.08), inset -5px -5px 15px rgba(0,0,0,0.95);
}

/* Constellation Relay Nodes */
.splash-sat-node {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #00ffff;
    border-radius: 50%;
    box-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0, 255, 255, 0.4);
}
.sat-1 { left: 35%; top: 38%; animation: orbitFloat 6s infinite alternate ease-in-out; }
.sat-2 { left: 52%; top: 58%; animation: orbitFloat 8s infinite alternate-reverse ease-in-out; }
.sat-3 { left: 70%; top: 42%; animation: orbitFloat 7s infinite alternate ease-in-out; }

/* Animated Cross-link Network Lines */
.splash-laser-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.65), transparent);
    transform-origin: left center;
    box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
}
.link-e-to-s1 { left: 23%; top: 44%; width: 13%; transform: rotate(-15deg); }
.link-s1-to-s2 { left: 35%; top: 38%; width: 18%; transform: rotate(43deg); }
.link-s2-to-s3 { left: 52%; top: 58%; width: 19%; transform: rotate(-37deg); }
.link-s3-to-m { left: 70%; top: 42%; width: 13%; transform: rotate(24deg); }

@keyframes orbitFloat {
    0% { transform: translate(0, 0); }
    100% { transform: translate(5px, -15px); }
}

/* Header Text Blocks */
.splash-title-block {
    text-align: center;
    z-index: 10;
    margin-bottom: 50px;
}

.splash-main-title {
    font-size: 42px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin: 0 0 12px 0;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 20px rgba(255,255,255,0.15);
}

.splash-subtitle {
    font-size: 11px;
    color: #00ff00;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: monospace;
}

/* Space-Grade Interactive Button */
.space-grade-btn {
    position: relative;
    background: transparent;
    color: #00ffff;
    border: 1px solid #00ffff;
    padding: 18px 40px;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    outline: none;
    z-index: 10;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.1), inset 0 0 0 rgba(0, 255, 255, 0);
    border-radius: 4px;
}

.space-grade-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 300%;
    height: 300%;
    background: #00ffff;
    transition: all 0.5s ease;
    transform: translate(-50%, -50%) rotate(45deg) scale(0);
    z-index: -1;
}

.space-grade-btn:hover {
    color: #000000;
    box-shadow: 0 0 35px rgba(0, 255, 255, 0.5);
    letter-spacing: 6px;
}

.space-grade-btn:hover::before {
    transform: translate(-50%, -50%) rotate(45deg) scale(1);
}

.space-grade-btn:active {
    transform: scale(0.97);
}
</style>
</head>
<body>

    <div class="splash-earth"></div>
    <div class="splash-laser-line link-e-to-s1"></div>
    <div class="splash-sat-node sat-1"></div>
    <div class="splash-laser-line link-s1-to-s2"></div>
    <div class="splash-sat-node sat-2"></div>
    <div class="splash-laser-line link-s2-to-s3"></div>
    <div class="splash-sat-node sat-3"></div>
    <div class="splash-laser-line link-s3-to-m"></div>
    <div class="splash-moon"></div>

    <div class="splash-title-block">
        <h1 class="splash-main-title">LunaNet Framework</h1>
        <div class="splash-subtitle">Multi-Node Interoperable Lunar Communication Simulator</div>
    </div>

    <button class="space-grade-btn" onclick="openSimulator()">Simulate the lunanet</button>

<script>
function openSimulator() {
    // Navigates directly into your main mission control dashboard file
    window.location.href = "Index.html";
}
</script>
</body>
</html>
